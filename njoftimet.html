<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">

    <title>Njoftimet - Xhamia e Ratkocit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #070a11; 
            color: white; 
            overflow-x: hidden;
            padding-bottom: 120px; /* Hapësirë për navbarin */
        }

        .bg-mosque {
            background-image: linear-gradient(to bottom, rgba(7, 10, 17, 0.85), rgba(7, 10, 17, 0.98)), 
                              url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 100vh; width: 100%; position: fixed; z-index: -1;
        }

        /* Stilimi i Navbar-it identik me index.html dhe kibla.html */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        /* Toggle Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }

        .notification-dot {
            width: 8px; height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="bg-mosque"></div>

    <div class="max-w-md mx-auto p-6">
        
        <header class="flex justify-between items-center mt-4 mb-10 opacity-0" id="header">
            <h1 class="text-2xl font-black tracking-tight">Cilësimet</h1>
            <div class="w-10 h-10 glass-panel flex items-center justify-center">
                <i class="ri-notification-badge-line text-emerald-400"></i>
            </div>
        </header>

        <section class="mb-8 opacity-0 translate-y-10" id="controls">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 ml-2">Alarmi i Vakteve</h2>
            <div class="glass-panel p-2">
                
    <div class="flex items-center justify-between p-4 border-b border-white/5">
        <span class="font-semibold text-sm">Sabahu</span>
        <label class="switch">
            <input type="checkbox" id="switch-Sabahu" onchange="toggleAlarm('Sabahu', this)">
            <span class="slider"></span>
        </label>
    </div>
    <div class="flex items-center justify-between p-4 border-b border-white/5">
        <span class="font-semibold text-sm text-gray-300">Dreka</span>
        <label class="switch">
            <input type="checkbox" id="switch-Dreka" onchange="toggleAlarm('Dreka', this)">
            <span class="slider"></span>
        </label>
    </div>
    <div class="flex items-center justify-between p-4 border-b border-white/5">
        <span class="font-semibold text-sm text-gray-300">Ikindia</span>
        <label class="switch">
            <input type="checkbox" id="switch-Ikindia" onchange="toggleAlarm('Ikindia', this)">
            <span class="slider"></span>
        </label>
    </div>
    <div class="flex items-center justify-between p-4 border-b border-white/5">
        <span class="font-semibold text-sm">Akshami</span>
        <label class="switch">
            <input type="checkbox" id="switch-Akshami" onchange="toggleAlarm('Akshami', this)">
            <span class="slider"></span>
        </label>
    </div>
    <div class="flex items-center justify-between p-4">
        <span class="font-semibold text-sm text-gray-300">Jacia</span>
        <label class="switch">
            <input type="checkbox" id="switch-Jacia" onchange="toggleAlarm('Jacia', this)">
            <span class="slider"></span>
        </label>
    </div>
</div>
            </div>
        </section>

      <section class="mb-8" id="mosque-management">
    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 ml-2 italic">Stafi dhe Aktivitetet e Xhamisë</h2>
    
    <div class="space-y-4">
        
        <!-- KARTELA E STAFIT (HOXHA & MUEZINI) -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Hoxha -->
            <a href="LINKU_YT_KETU" target="_blank" class="glass-panel p-4 flex flex-col items-center text-center hover:border-gold/50 transition-all group">
                <div class="w-12 h-12 rounded-full bg-emerald-900/50 flex items-center justify-center mb-3 border border-gold/30 group-hover:scale-110 transition-transform">
                    <span class="text-2xl">🕌</span>
                </div>
                <h3 class="text-[10px] font-bold text-gold uppercase tracking-tighter mb-1">Imami</h3>
                <p class="text-xs font-extrabold text-white">Samir Mullafetahu</p>
            </a>

            <!-- Muezini -->
            <a href="LINKU_YT_KETU" target="_blank" class="glass-panel p-4 flex flex-col items-center text-center hover:border-gold/50 transition-all group">
                <div class="w-12 h-12 rounded-full bg-emerald-900/50 flex items-center justify-center mb-3 border border-gold/30 group-hover:scale-110 transition-transform">
                    <span class="text-2xl">📢</span>

        <!-- LIGJERATA E XHUMASË (E POSAÇME) -->

                    <span class="w-2 h-2 bg-gold rounded-full mr-2 animate-pulse"></span>

</section>

        <!-- Navi Bar i Sinkronizuar (Identik me index dhe kibla) -->
        <nav class="fixed bottom-6 left-6 right-6 h-20 glass-card flex items-center justify-around px-4 opacity-0 translate-y-10" id="bottomNav">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors">

            <a href="njoftimet.html" class="flex flex-col items-center gap-1 text-emerald-400">

                <span class="text-[9px] font-black uppercase">Njoftime</span>
            </a>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

            tl.to("#header", { opacity: 1, duration: 1 })
              .to("#controls", { opacity: 1, y: 0, duration: 1 }, "-=0.7")
              .to("#messages", { opacity: 1, y: 0, duration: 1 }, "-=0.8")
              .to("#bottomNav", { opacity: 1, y: 0, duration: 1 }, "-=1.2");
        });








        // 1. Regjistrimi i Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// 2. Funksioni për Ndezje/Fikje
async function toggleAlarm(vakti, element) {
    if (element.checked) {
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            localStorage.setItem(`alarm-${vakti}`, "active");
            // Test i shpejtë konfirmues
            const reg = await navigator.serviceWorker.ready;
            reg.showNotification("Xhamia e Ratkocit", {
                body: `Njoftimet për ${vakti} u aktivizuan.`,
                icon: "https://cdn-icons-png.flaticon.com/512/2950/2950657.png",
                vibrate: [100, 50, 100]
            });
        } else {
            alert("Ju lutem lejoni njoftimet në settings të telefonit.");
            element.checked = false;
        }
    } else {
        localStorage.removeItem(`alarm-${vakti}`);
    }
}

// 3. Mekanizmi i kontrollit të kohës (Çdo 60 sekonda)
setInterval(() => {
    const tani = new Date();
    const oraAktuale = tani.getHours().toString().padStart(2, '0') + ":" + 
                       tani.getMinutes().toString().padStart(2, '0');

    // Ky orar duhet të përditësohet sipas kohës reale të vaktit
    const orariVakteve = {
        "Sabahu": "04:45",
        "Dreka": "12:50",
        "Ikindia": "16:15",
        "Akshami": "19:55",
        "Jacia": "21:20"
    };

    for (let vakti in orariVakteve) {
        if (orariVakteve[vakti] === oraAktuale) {
            if (localStorage.getItem(`alarm-${vakti}`) === "active") {
                shfaqNjoftimin(vakti);
            }
        }
    }
}, 60000);

function shfaqNjoftimin(emriVaktit) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification("Koha e Namazit", {
                body: `Është koha e vaktit të ${emriVaktit} në Ratkoc.`,
                icon: "https://cdn-icons-png.flaticon.com/512/2950/2950657.png",
                vibrate: [500, 100, 500],
                tag: 'vakti-alarm',
                renotify: true
            });
        });
    }
}

// 4. Rivendos switch-at kur hapet App-i
document.addEventListener('DOMContentLoaded', () => {
    ['Sabahu', 'Dreka', 'Ikindia', 'Akshami', 'Jacia'].forEach(v => {
        const status = localStorage.getItem(`alarm-${v}`);
        const sw = document.getElementById(`switch-${v}`);
        if (status === "active" && sw) sw.checked = true;
    });
});
    </script>
