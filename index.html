    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xhamia e Ratkocit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070a11; color: white; overflow: hidden; }
        
        .bg-mosque {
            background-image: linear-gradient(to bottom, rgba(7, 10, 17, 0.7), rgba(7, 10, 17, 0.98)), 
                              url('Images/604776747_122280490772225847_4370550408157022665_n.jpg');
            background-size: cover; background-position: center;
            height: 100vh; width: 100%; position: fixed; z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .active-prayer {
            background: rgba(16, 185, 129, 0.15) !important;
            border: 1px solid rgba(16, 185, 129, 0.4) !important;
        }

        /* Pulse animation for live effect */
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-mosque"></div>

    <div class="max-w-md mx-auto h-screen flex flex-col p-6 relative">
        
        <!-- Header -->
        <header class="flex justify-between items-center mt-4 mb-6 opacity-0" id="header">
            <div>
                <h2 class="text-[10px] uppercase tracking-[0.2em] text-emerald-400 font-bold mb-1">Ratkoc, Kosovë</h2>
                <h1 class="text-xl font-bold tracking-tight">Xhamia e Fshatit</h1>
            </div>
            <div id="date-islamic" class="text-right">
                <p class="text-[11px] text-gray-400 font-medium uppercase" id="hijri-date">Duke u ngarkuar...</p>
                <p class="text-[10px] text-emerald-500/80 font-bold" id="gregorian-date"></p>
            </div>
        </header>

        <!-- Main Status Card -->
        <div class="glass-card p-6 mb-6 opacity-0 translate-y-10" id="mainCard">
            <div class="flex justify-between items-center mb-6">
                <span class="flex items-center gap-2 text-xs font-semibold text-emerald-400">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    KOHA AKTUALE
                </span>
                <span id="live-clock" class="text-lg font-mono font-bold tracking-widest text-white">00:00:00</span>
            </div>
            
            <div class="text-center py-2">
                <h3 id="next-prayer-name" class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2">Radha e namazit</h3>
                <div id="next-prayer-time" class="text-6xl font-black tracking-tighter text-white">-:-</div>
            </div>
        </div>

        <!-- Prayer Times List -->
        <div class="grid grid-cols-1 gap-3 overflow-y-auto pb-32" id="prayer-list">
            <!-- Items injected by JS -->
        </div>
<nav class="fixed bottom-6 left-6 right-6 h-20 glass-card flex items-center justify-around px-4 opacity-0 translate-y-10" id="bottomNav">
    <a href="xhamia1.html" class="flex flex-col items-center gap-1 text-emerald-400">
        <i class="ri-time-fill text-2xl"></i>
        <span class="text-[9px] font-black uppercase">Vaktet</span>
    </a>
    <a href="kibla.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors">
        <i class="ri-compass-3-line text-2xl"></i>
        <span class="text-[9px] font-black uppercase">Kibla</span>
    </a>
    <a href="njoftimet.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors">
        <i class="ri-notification-badge-line text-2xl"></i>
        <span class="text-[9px] font-black uppercase">Njoftime</span>
    </a>
</nav>
    </div>

    <script>
        const CONFIG = {
            city: "Rahovec", // Ratkoci i takon Rahovecit për koordinata
            country: "Kosovo",
            method: 3 // Muslim World League (Përdoret në Kosovë)
        };

        async function fetchPrayerTimes() {
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${CONFIG.city}&country=${CONFIG.country}&method=${CONFIG.method}`);
                const data = await response.json();
                renderData(data.data);
            } catch (error) {
                console.error("Gabim në marrjen e të dhënave:", error);
            }
        }

        function renderData(data) {
            const timings = data.timings;
            const prayerNames = {
                Fajr: "Sabahu",
                Sunrise: "Lindja Diellit",
                Dhuhr: "Dreka",
                Asr: "Ikindia",
                Maghrib: "Akshami",
                Isha: "Jacia"
            };

            // Update Dates
            document.getElementById('hijri-date').innerText = `${data.date.hijri.day} ${data.date.hijri.month.en} ${data.date.hijri.year}`;
            document.getElementById('gregorian-date').innerText = data.date.readable;

            const listContainer = document.getElementById('prayer-list');
            listContainer.innerHTML = '';

            const now = new Date();
            let nextPrayerFound = false;

            Object.entries(prayerNames).forEach(([key, name]) => {
                const time = timings[key];
                const isNext = checkIfNext(time) && !nextPrayerFound;
                
                if(isNext) {
                    nextPrayerFound = true;
                    document.getElementById('next-prayer-name').innerText = `Namazi i radhës: ${name}`;
                    document.getElementById('next-prayer-time').innerText = time;
                }

                const card = `
                    <div class="time-card glass-card p-4 flex justify-between items-center transition-all duration-500 ${isNext ? 'active-prayer pulse' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 ${isNext ? 'bg-emerald-500' : 'bg-white/5'} rounded-2xl flex items-center justify-center transition-colors">
                                <i class="ri-time-line ${isNext ? 'text-white' : 'text-gray-400'}"></i>
                            </div>
                            <span class="font-bold text-sm tracking-wide ${isNext ? 'text-white' : 'text-gray-300'}">${name}</span>
                        </div>
                        <span class="font-mono font-bold ${isNext ? 'text-white text-xl' : 'text-gray-400'}">${time}</span>
                    </div>
                `;
                listContainer.innerHTML += card;
            });

            // Trigger Animations after content is loaded
            startAnimations();
        }

        function checkIfNext(prayerTime) {
            const now = new Date();
            const [hours, minutes] = prayerTime.split(':');
            const pTime = new Date();
            pTime.setHours(hours, minutes, 0);
            return pTime > now;
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toLocaleTimeString('sq-AL', { hour12: false });
            }, 1000);
        }

        function startAnimations() {
            const tl = gsap.timeline({ defaults: { ease: "expo.out" } });
            tl.to("#header", { opacity: 1, duration: 1 })
              .to("#mainCard", { opacity: 1, y: 0, duration: 1 }, "-=0.5")
              .to(".time-card", { opacity: 1, x: 0, stagger: 0.1, duration: 0.8 }, "-=0.8")
              .to("#bottomNav", { opacity: 1, y: 0, duration: 1 }, "-=1");
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchPrayerTimes();
            startClock();
        });
    </script>
</body>
</html>
